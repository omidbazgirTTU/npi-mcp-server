<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Organization Roster</title>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background: #f9fafb; margin: 0; padding: 12px; }
      h1 { font-size: 16px; margin: 0 0 6px; color: #0f172a; }
      .meta { font-size: 12px; color: #475569; margin-bottom: 8px; }
      ul { list-style: none; padding: 0; margin: 0; }
      li { background: #fff; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06); }
      .name { font-weight: 600; color: #111827; font-size: 14px; }
      .taxonomy { font-size: 12px; color: #4338ca; margin: 4px 0; }
      .location { font-size: 12px; color: #475569; }
    </style>
  </head>
  <body>
    <h1>Organization Roster</h1>
    <div class="meta" id="meta"></div>
    <ul id="roster"></ul>
    <script>
      window.renderOrgRoster = function ({ roster = [], summary = {} } = {}) {
        const meta = document.getElementById("meta");
        meta.textContent = `${summary.organization || "Organization"} • ${summary.count || roster.length} providers` +
          (summary.specialty ? ` • ${summary.specialty}` : "") +
          (summary.state ? ` • ${summary.state}` : "");

        const list = document.getElementById("roster");
        list.innerHTML = "";
        roster.forEach((entry) => {
          const li = document.createElement("li");
          li.innerHTML = `
            <div class="name">${entry.name || "Unknown"}</div>
            <div class="taxonomy">${entry.primary_taxonomy || "—"}</div>
            <div class="location">${[entry.city, entry.state].filter(Boolean).join(", ")}</div>
            <div class="taxonomy">NPI: ${entry.npi || "—"}</div>
          `;
          list.appendChild(li);
        });
      };
    </script>
  </body>
</html>
