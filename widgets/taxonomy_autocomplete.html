<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Taxonomy Autocomplete</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f8fafc; margin: 0; padding: 12px; }
      h1 { font-size: 15px; margin: 0 0 10px; color: #0f172a; }
      .match { background: #fff; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
      .code { font-weight: 600; font-size: 13px; color: #4338ca; margin-right: 12px; }
      .desc { font-size: 12px; color: #1e293b; flex: 1; }
      .summary { font-size: 12px; color: #475569; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <h1>Taxonomy Suggestions</h1>
    <div class="summary" id="summary"></div>
    <div id="matches"></div>
    <script>
      window.renderTaxonomySuggestions = function ({ matches = [], query = null } = {}) {
        document.getElementById("summary").textContent = `${matches.length} matches for "${query || "all"}"`;
        const container = document.getElementById("matches");
        container.innerHTML = "";
        matches.forEach((entry) => {
          const div = document.createElement("div");
          div.className = "match";
          div.innerHTML = `
            <span class="code">${entry.code}</span>
            <span class="desc">${entry.description}</span>
          `;
          container.appendChild(div);
        });
      };
    </script>
  </body>
</html>
