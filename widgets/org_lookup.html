<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Organizations By Geography</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f8fafc; margin: 0; padding: 12px; }
      h1 { font-size: 16px; margin: 0 0 8px; color: #0f172a; }
      .summary { font-size: 12px; color: #475569; margin-bottom: 10px; }
      .org { background: #fff; border-radius: 10px; padding: 10px 12px; border: 1px solid #e2e8f0; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06); }
      .name { font-weight: 600; color: #111827; font-size: 14px; margin-bottom: 4px; }
      .meta { font-size: 12px; color: #475569; }
      .taxonomy { font-size: 12px; color: #4338ca; margin-top: 4px; }
    </style>
  </head>
  <body>
    <h1>Organizations</h1>
    <div class="summary" id="summary"></div>
    <div id="org-list"></div>
    <script>
      window.renderOrganizationLookup = function ({ summary = {}, organizations = [] } = {}) {
        const summaryDiv = document.getElementById("summary");
        const pieces = [];
        if (summary.city) pieces.push(summary.city);
        if (summary.state) pieces.push(summary.state);
        if (summary.postal_code) pieces.push(`ZIP ${summary.postal_code}`);
        if (summary.specialty) pieces.push(summary.specialty);
        summaryDiv.textContent = `${organizations.length} organizations${pieces.length ? " • " + pieces.join(" • ") : ""}`;

        const list = document.getElementById("org-list");
        list.innerHTML = "";
        organizations.forEach((org) => {
          const div = document.createElement("div");
          div.className = "org";
          div.innerHTML = `
            <div class="name">${org.name || "Unnamed org"}</div>
            <div class="meta">${[org.city, org.state].filter(Boolean).join(", ")} • NPI ${org.npi || "—"}</div>
            <div class="taxonomy">${org.primary_taxonomy || ""}</div>
          `;
          list.appendChild(div);
        });
      };
    </script>
  </body>
</html>
