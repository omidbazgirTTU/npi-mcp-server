<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NPI Verification</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f5f7fb; margin: 0; padding: 12px; }
      h1 { font-size: 16px; margin: 0 0 8px; color: #0f172a; }
      .summary { font-size: 12px; color: #475569; margin-bottom: 10px; }
      table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08); }
      th, td { font-size: 12px; padding: 8px 10px; border-bottom: 1px solid #eef2f7; text-align: left; }
      th { background: #f1f5f9; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }
      tr:last-child td { border-bottom: none; }
      .status-ok { color: #0f9d58; font-weight: 600; }
      .status-fail { color: #d93025; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>NPI Verification</h1>
    <div class="summary" id="summary"></div>
    <table id="verification-table">
      <thead>
        <tr>
          <th>NPI</th>
          <th>Name</th>
          <th>Status</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script>
      function formatName(entry = {}) {
        return [entry.first_name, entry.last_name].filter(Boolean).join(" ") || entry.organization_name || "—";
      }
      window.renderVerificationResults = function ({ summary = {}, verified = [], failed = [] } = {}) {
        const tbody = document.querySelector("#verification-table tbody");
        tbody.innerHTML = "";
        verified.forEach((row) => {
          const provider = row.provider || {};
          const basic = provider.basic || {};
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${provider.npi || row.input?.npi || "—"}</td>
            <td>${formatName(basic)}</td>
            <td class="status-ok">Verified</td>
            <td>${(provider.taxonomies?.[0]?.description) || ""}</td>
          `;
          tbody.appendChild(tr);
        });
        failed.forEach((row) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.npi || row.input?.npi || "—"}</td>
            <td>${formatName(row)}</td>
            <td class="status-fail">Failed</td>
            <td>${row.error || "Not found"}</td>
          `;
          tbody.appendChild(tr);
        });
        const summaryDiv = document.getElementById("summary");
        summaryDiv.textContent = `Verified ${summary.verified || 0} • Failed ${summary.failed || failed.length} • Total ${summary.total || 0}`;
      };
    </script>
  </body>
</html>
